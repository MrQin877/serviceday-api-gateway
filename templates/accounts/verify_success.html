{% extends "base.html" %}

{% block content %}

<div class="max-w-2xl mx-auto">

    <!-- Main Card -->
    <div class="bg-white rounded-[2rem] shadow-2xl p-12 text-center relative overflow-hidden">

        <!-- Decorative background blobs -->
        <div class="absolute -top-10 -right-10 w-48 h-48 bg-[#FFF4A3] rounded-full opacity-50"></div>
        <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-[#B8E6B8] rounded-full opacity-50"></div>

        <div class="relative z-10">

            <!-- Animated success icon -->
            <div class="flex justify-center mb-6">
                <div class="w-24 h-24 bg-gradient-to-br from-[#FFF4A3] to-[#B8E6B8] rounded-full flex items-center justify-center shadow-lg"
                     style="animation: float 3s infinite ease-in-out;">
                    <span class="text-5xl">✅</span>
                </div>
            </div>

            <!-- Badge -->
            <span class="inline-block bg-gradient-to-r from-[#FFF4A3] to-[#B8E6B8] text-black text-sm font-semibold px-5 py-1.5 rounded-full mb-6 shadow-sm">
                🌱 Email Verified
            </span>

            <!-- Headline -->
            <h1 class="text-4xl font-bold text-black mb-4 leading-tight">
                You're All Set!
            </h1>

            <p class="text-gray-500 text-lg max-w-md mx-auto mb-8">
                Your email has been verified successfully. You can now log in and start volunteering on Service Day.
            </p>

            <!-- Divider -->
            <div class="border-t border-gray-100 my-8"></div>

            <!-- What's next -->
            <div class="grid grid-cols-3 gap-4 mb-8 text-sm">

                <div class="flex flex-col items-center gap-2">
                    <div class="w-10 h-10 bg-gradient-to-br from-[#FFF4A3] to-[#B8E6B8] rounded-full flex items-center justify-center shadow-sm">
                        <span class="text-lg">🔑</span>
                    </div>
                    <p class="text-gray-500 leading-snug">Log in to your account</p>
                </div>

                <div class="flex flex-col items-center gap-2">
                    <div class="w-10 h-10 bg-gradient-to-br from-[#FFF4A3] to-[#B8E6B8] rounded-full flex items-center justify-center shadow-sm">
                        <span class="text-lg">🤝</span>
                    </div>
                    <p class="text-gray-500 leading-snug">Browse NGO opportunities</p>
                </div>

                <div class="flex flex-col items-center gap-2">
                    <div class="w-10 h-10 bg-gradient-to-br from-[#FFF4A3] to-[#B8E6B8] rounded-full flex items-center justify-center shadow-sm">
                        <span class="text-lg">📋</span>
                    </div>
                    <p class="text-gray-500 leading-snug">Register for an activity</p>
                </div>

            </div>

            <!-- CTA -->
            <a href="{% url 'login' %}"
               class="inline-block bg-gradient-to-r from-[#FFF4A3] to-[#B8E6B8] text-black font-semibold px-10 py-3 rounded-2xl shadow-md hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
                Log In Now →
            </a>

        </div>
    </div>

</div>

{% endblock %}
