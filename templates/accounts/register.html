<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50%       { transform: translateY(-20px) translateX(10px); }
        }
        .float-animation { animation: float 6s infinite ease-in-out; }

        @keyframes floatReverse {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50%       { transform: translateY(20px) translateX(-10px); }
        }
        .float-reverse { animation: floatReverse 8s infinite ease-in-out; }
    </style>
</head>

<!--
  FIXES:
  1. Removed overflow-hidden  → page can now scroll freely
  2. Changed items-center     → items-start so card starts at top, not cut off
  3. Increased py to py-10    → breathing room top and bottom when scrolling
  4. Floating circles use     → fixed positioning so they stay in background on scroll
-->
<body class="min-h-screen bg-gradient-to-br from-[#FFF4A3] to-[#B8E6B8]
             flex items-start justify-center py-10 px-4 relative">

    <!-- Floating decorative circles — fixed so they don't scroll away -->
    <div class="fixed top-16 left-8 w-32 h-32 bg-[#B8E6B8] rounded-full opacity-40 float-animation pointer-events-none"></div>
    <div class="fixed bottom-16 right-8 w-24 h-24 bg-[#FFF4A3] rounded-full opacity-40 float-reverse pointer-events-none"></div>
    <div class="fixed top-1/2 right-16 w-16 h-16 bg-[#B8E6B8] rounded-full opacity-20 float-animation pointer-events-none" style="animation-delay: 3s;"></div>

    <!-- Register Card -->
    <div class="bg-white rounded-[2rem] shadow-2xl p-10 w-full max-w-md relative z-10 my-4">

        <!-- Back to Home -->
        <a href="{% url 'home' %}"
           class="inline-flex items-center gap-1.5 text-sm text-gray-400 hover:text-black transition-all group mb-6">
            <span class="group-hover:-translate-x-1 transition-transform duration-200">←</span>
            Back to Home
        </a>

        <!-- Logo -->
        <div class="flex justify-center mb-5">
            <div class="w-20 h-20 bg-gradient-to-br from-[#FFF4A3] to-[#B8E6B8] rounded-full flex items-center justify-center text-3xl">
                🌱
            </div>
        </div>

        <!-- Heading -->
        <h2 class="text-3xl font-bold text-center text-black mb-1">Create Account</h2>
        <p class="text-center text-gray-500 mb-6 text-sm">Join us and make a difference this Service Day.</p>

        <!-- Messages -->
        {% if messages %}
            {% for message in messages %}
                {% if message.tags == 'error' %}
                <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl mb-4 text-sm">
                    {{ message }}
                </div>
                {% else %}
                <div class="bg-green-50 border border-green-200 text-green-600 px-4 py-3 rounded-xl mb-4 text-sm">
                    {{ message }}
                </div>
                {% endif %}
            {% endfor %}
        {% endif %}

        <!-- Register Form -->
        <form method="POST">
            {% csrf_token %}

            <!-- First Name + Last Name -->
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div>
                    <label class="block text-black font-medium mb-1.5 text-sm">First Name</label>
                    <input type="text" name="first_name" placeholder="John"
                           value="{{ request.POST.first_name }}" required
                           class="w-full px-4 py-3 bg-gray-50 rounded-2xl border-2 border-transparent
                                  focus:border-[#B8E6B8] focus:bg-white focus:outline-none transition-all duration-300 text-sm">
                </div>
                <div>
                    <label class="block text-black font-medium mb-1.5 text-sm">Last Name</label>
                    <input type="text" name="last_name" placeholder="Doe"
                           value="{{ request.POST.last_name }}" required
                           class="w-full px-4 py-3 bg-gray-50 rounded-2xl border-2 border-transparent
                                  focus:border-[#B8E6B8] focus:bg-white focus:outline-none transition-all duration-300 text-sm">
                </div>
            </div>

            <!-- Username -->
            <div class="mb-4">
                <label class="block text-black font-medium mb-1.5 text-sm">Username</label>
                <input type="text" name="username" placeholder="e.g. johndoe123"
                       value="{{ request.POST.username }}" required
                       class="w-full px-5 py-3 bg-gray-50 rounded-2xl border-2 border-transparent
                              focus:border-[#B8E6B8] focus:bg-white focus:outline-none transition-all duration-300 text-sm">
            </div>

            <!-- Email -->
            <div class="mb-4">
                <label class="block text-black font-medium mb-1.5 text-sm">Email</label>
                <input type="email" name="email" placeholder="john@company.com"
                       value="{{ request.POST.email }}" required
                       class="w-full px-5 py-3 bg-gray-50 rounded-2xl border-2 border-transparent
                              focus:border-[#B8E6B8] focus:bg-white focus:outline-none transition-all duration-300 text-sm">
            </div>

            <!-- Password -->
            <div class="mb-4">
                <label class="block text-black font-medium mb-1.5 text-sm">Password</label>
                <input type="password" name="password1" placeholder="Min. 8 characters" required
                       class="w-full px-5 py-3 bg-gray-50 rounded-2xl border-2 border-transparent
                              focus:border-[#B8E6B8] focus:bg-white focus:outline-none transition-all duration-300 text-sm">
            </div>

            <!-- Confirm Password -->
            <div class="mb-6">
                <label class="block text-black font-medium mb-1.5 text-sm">Confirm Password</label>
                <input type="password" name="password2" placeholder="••••••••" required
                       class="w-full px-5 py-3 bg-gray-50 rounded-2xl border-2 border-transparent
                              focus:border-[#B8E6B8] focus:bg-white focus:outline-none transition-all duration-300 text-sm">
            </div>

            <!-- Submit -->
            <button type="submit"
                    class="w-full bg-gradient-to-r from-[#FFF4A3] to-[#B8E6B8] text-black font-semibold
                           py-4 rounded-2xl hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300">
                Create Account
            </button>
        </form>

        <!-- Login link -->
        <p class="text-center mt-5 text-gray-600 text-sm">
            Already have an account?
            <a href="{% url 'login' %}"
               class="text-black font-semibold border-b-2 border-[#B8E6B8] hover:border-[#FFF4A3] transition-colors">
                Log in
            </a>
        </p>

    </div>

</body>
</html>
